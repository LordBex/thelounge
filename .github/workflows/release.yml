name: Release

permissions:
  contents: read
  id-token: write

on:
  push:
    tags: v*

jobs:
  release:
    name: Release workflow
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pinned to 22.x (current LTS) — "latest" pulls Node 24, for which
          # better-sqlite3 12.4.1 ships no prebuilt binaries and the install
          # gyp build fails silently, breaking the test step.
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org/"

      - name: Enable Corepack
        run: corepack enable

      - name: Upgrade npm CLI for Trusted Publishing
        # Temporarily pinned to 11: npm 12 has broken provenance (npm/cli#9722)
        run: npm install -g npm@11

      - name: Install
        run: yarn --immutable

      - name: Rebuild native modules
        run: yarn rebuild better-sqlite3

      - name: Build
        run: yarn build
        env:
          NODE_ENV: production

      - name: Test
        run: yarn test

      - name: Publish latest
        if: "!contains(github.ref, '-pre')"
        # --provenance ist PFLICHT für Trusted Publishing!
        run: npm publish --access public --tag latest --provenance

      - name: Publish next
        if: contains(github.ref, '-pre')
        run: npm publish --access public --tag next --provenance
